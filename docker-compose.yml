version: '3.8'

services:
  gas-tracker:
    build: .
    container_name: gas-tracker
    restart: unless-stopped
    environment:
      - PORT=3000
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - ALCHEMY_ETH_URL=${ALCHEMY_ETH_URL:-}
      - ALCHEMY_BASE_URL=${ALCHEMY_BASE_URL:-}
      - ALCHEMY_ARB_URL=${ALCHEMY_ARB_URL:-}
      - ALCHEMY_OPT_URL=${ALCHEMY_OPT_URL:-}
      - ALCHEMY_POLY_URL=${ALCHEMY_POLY_URL:-}
    expose:
      - "3000"
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: gas-tracker-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - gas-tracker

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
